name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 1. THÊM BIẾN MÔI TRƯỜNG VÀO ĐÂY ĐỂ XÓA CẢNH BÁO NODE.JS 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 2. HẠ CẤP XUỐNG JAVA 17 ĐỂ ĐỒNG BỘ VỚI CẤU HÌNH LOCAL CỦA DỰ ÁN
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' 
          distribution: 'temurin'
          cache: gradle

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets (Vue.js)
        run: npm run build

      - name: Sync with Capacitor
        run: npx cap sync android

      - name: Build Android APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK Manually
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 1. Di chuyển vào thư mục chứa file APK vừa build xong
          cd android/app/build/outputs/apk/release
          
          # 2. Giải mã file Keystore từ Secret
          echo $KEYSTORE_BASE64 | base64 --decode > keystore.jks
          
          # 3. Tự động lấy bộ công cụ Build Tools mới nhất của GitHub
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 4. Chạy Zipalign để tối ưu hóa file APK
          $BUILD_TOOLS/zipalign -v -p 4 app-release-unsigned.apk app-release-aligned.apk
          
          # 5. Ký tên file APK bằng apksigner (Đổi tên file thành Security-App-Release.apk)
          $BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-pass pass:$KEYSTORE_PASSWORD --ks-key-alias "$KEY_ALIAS" --key-pass pass:$KEY_PASSWORD --out Security-App-Release.apk app-release-aligned.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Security-App-V1
          path: android/app/build/outputs/apk/release/Security-App-Release.apk
          retention-days: 7