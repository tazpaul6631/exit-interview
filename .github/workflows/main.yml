name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' 
          distribution: 'temurin'
          cache: gradle

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets (Vue.js)
        run: npm run build

      - name: Sync with Capacitor
        run: npx cap sync android

      - name: Build Android APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # BƯỚC MỚI: Tự động tạo Keystore ngay trên Server và ký APK
      - name: Auto Generate Keystore and Sign APK
        run: |
          cd android/app/build/outputs/apk/release
          
          # 1. Tạo một Keystore mới tinh ngay lập tức bằng Java 17 của Server
          keytool -genkey -v -keystore auto-github-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias auto_alias -storepass 12345678 -keypass 12345678 -dname "CN=Thuan, OU=IT, O=JiaHsin, L=HCM, S=HCM, C=VN"
          
          # 2. Lấy Build Tools
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 3. Zipalign
          $BUILD_TOOLS/zipalign -v -p 4 app-release-unsigned.apk app-release-aligned.apk
          
          # 4. Ký tên trực tiếp bằng Keystore vừa tạo
          $BUILD_TOOLS/apksigner sign --ks auto-github-key.jks --ks-pass pass:12345678 --ks-key-alias "auto_alias" --key-pass pass:12345678 --out Security-App-Release.apk app-release-aligned.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Security-App-V1
          path: android/app/build/outputs/apk/release/Security-App-Release.apk
          retention-days: 7